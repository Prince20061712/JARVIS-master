version: '3.8'

services:
  jarvis-backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - CHROMA_DB_PATH=/app/data/chroma
      - SQLITE_PATH=/app/data/jarvis.db
    depends_on:
      - chromadb
      - ollama
    networks:
      - jarvis-network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - jarvis-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - jarvis-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  chromadb-data:
  ollama-models:

networks:
  jarvis-network:
    driver: bridge
